name: Test FRED API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test FRED CSV API
        run: |
          echo "=== GitHub Actions IP ==="
          curl -s https://httpbin.org/ip
          echo ""
          echo ""
          echo "=== FRED FEDFUNDS CSV ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\nTime: %{time_total}s\n" \
            "https://fred.stlouisfed.org/graph/fredgraph.csv?id=FEDFUNDS&cosd=2024-01-01"
          echo ""
          echo "=== Last 3 rows ==="
          curl -s "https://fred.stlouisfed.org/graph/fredgraph.csv?id=FEDFUNDS&cosd=2024-01-01" | tail -3
          echo ""
          echo ""
          echo "=== 한국은행 ECOS API ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\nTime: %{time_total}s\n" \
            "https://ecos.bok.or.kr/api/StatisticSearch/sample/json/kr/1/10/722Y001/M/202501/202603/0101000"
          echo ""
          echo "=== ECOS Response (first 300 chars) ==="
          curl -s "https://ecos.bok.or.kr/api/StatisticSearch/sample/json/kr/1/10/722Y001/M/202501/202603/0101000" | head -c 300
          echo ""
