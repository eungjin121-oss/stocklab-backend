name: Collect Stock Data

on:
  schedule:
    # 한국 장시간 (UTC 00:00~06:30) 10분 간격
    - cron: '*/10 0-6 * * 1-5'
    # 미국 장시간 (UTC 14:30~21:00) 10분 간격
    - cron: '*/10 14-20 * * 1-5'
    # 비장시간 30분 간격
    - cron: '0,30 7-13,21-23 * * 1-5'
    # 주말 1시간 간격
    - cron: '0 */2 * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Collect data
        run: node collect.js
        timeout-minutes: 5
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
