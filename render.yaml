# Render.com Blueprint — StockLab Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stocklab-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false  # Render 대시보드에서 수동 입력
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false  # Render 대시보드에서 수동 입력 (선택)
      - key: HF_TOKEN
        sync: false  # Render 대시보드에서 수동 입력 (선택)
